name: CI

# push / PR 自动跑回归:编译全部模块(compileall)+ 逐个跑"不联网"selftest。
# 推到 GitHub 后即生效;若本仓暂未托管到 GitHub,本文件为"就绪即用"资产、无副作用。
on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

# 同一分支的新提交自动取消仍在跑的旧任务,省额度。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftests:
    name: compileall + selftests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # 某个 Python 版本挂了,其余版本仍继续跑
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 装核心 + 内容 QC 依赖([qc]=pypdf/rapidfuzz):离线 selftest 里 download/selftest_e2e/
      # build_coverage 的内容 QC 路径需 pypdf 才能全绿。[cf]/[browser] 为可选(需 curl_cffi/Chrome),
      # 相关模块函数内延迟导入、缺则优雅 no-op,故 CI 不装、不影响其 selftest 通过。
      - name: Install (core + content-QC deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[qc]"

      # 语法/导入基线:全部模块可编译。
      - name: Compile all modules
        run: python -m compileall -q fulltext_fetcher

      # 优先用队友的一键回归脚本 run_all_selftests.py(若已就绪);
      # 未就绪时回退到逐模块显式调用(与 D1 验收清单一致)。
      - name: Run selftests (offline)
        run: |
          if [ -f run_all_selftests.py ]; then
            echo "==> run_all_selftests.py 就绪:一键跑全量 selftest + compileall"
            python run_all_selftests.py
          else
            echo "==> run_all_selftests.py 未就绪:逐模块回退跑各 selftest"
            python -m fulltext_fetcher.landing
            python -m fulltext_fetcher.resolve
            python -m fulltext_fetcher.sources.aggregators
            python -m fulltext_fetcher.report
            python -m fulltext_fetcher.download
            python -m fulltext_fetcher.cli --selftest
            python -m fulltext_fetcher.sources.green_oa
            python -m fulltext_fetcher.snapshot_bootstrap selftest
            python -m fulltext_fetcher.zotero
            python -m fulltext_fetcher.selftest_e2e
          fi
